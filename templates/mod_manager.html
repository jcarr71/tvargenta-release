<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVArgenta - Mod Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='tailwind.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff 0%, #0088ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #0088ff 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.3);
        }

        .btn-secondary {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            border: 1px solid #00d4ff;
        }

        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.3);
        }

        .btn-patches {
            background: rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.6);
        }

        .btn-patches:hover {
            background: rgba(255, 107, 107, 0.5);
            border-color: #ff6b6b;
        }

        .btn-channels {
            background: rgba(255, 193, 7, 0.3);
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.6);
        }

        .btn-channels:hover {
            background: rgba(255, 193, 7, 0.5);
            border-color: #ffc107;
        }

        .btn-uploads {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.6);
        }

        .btn-uploads:hover {
            background: rgba(76, 175, 80, 0.5);
            border-color: #4caf50;
        }

        .main-content {
            display: grid;
            gap: 2rem;
        }

        .card {
            background: rgba(22, 33, 62, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 0.75rem;
            padding: 2rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card h3 {
            font-size: 1.1rem;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            color: #00d4ff;
        }

        .mod-list {
            display: grid;
            gap: 1.5rem;
        }

        .mod-item {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 0.5rem;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 1.5rem;
            transition: all 0.3s ease;
        }

        .mod-item:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.1);
        }

        .mod-info h3 {
            font-size: 1.1rem;
            color: #e0e0e0;
            margin: 0 0 0.5rem 0;
        }

        .mod-info p {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin: 0;
        }

        .mod-status {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-enabled {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.5);
        }

        .badge-disabled {
            background: rgba(200, 200, 200, 0.1);
            color: #999;
            border: 1px solid rgba(200, 200, 200, 0.3);
        }

        .mod-toggle {
            width: 60px;
            height: 30px;
            background: rgba(200, 200, 200, 0.2);
            border: 1px solid rgba(200, 200, 200, 0.3);
            border-radius: 15px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .mod-toggle.enabled {
            background: rgba(76, 175, 80, 0.2);
            border-color: rgba(76, 175, 80, 0.5);
        }

        .mod-toggle::after {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            background: #999;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.3s ease;
        }

        .mod-toggle.enabled::after {
            background: #4caf50;
            left: 32px;
        }

        .upload-area {
            border: 2px dashed rgba(0, 212, 255, 0.3);
            border-radius: 0.75rem;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 212, 255, 0.05);
        }

        .upload-area:hover {
            border-color: rgba(0, 212, 255, 0.6);
            background: rgba(0, 212, 255, 0.1);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .upload-area p {
            margin: 0 0 1.5rem 0;
            color: #a0a0a0;
        }

        .upload-area p strong {
            color: #00d4ff;
            display: block;
            margin-bottom: 0.5rem;
        }

        .file-input-label {
            display: inline-block;
        }

        .file-input-label input {
            display: none;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: center;
        }

        .btn-danger {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.5);
        }

        .btn-danger:hover:not(:disabled) {
            background: rgba(255, 107, 107, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .warning-box {
            background: rgba(255, 193, 7, 0.1);
            border-left: 4px solid #ffc107;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            color: #ffc107;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.5rem;
        }

        .status-applied {
            background: #4caf50;
        }

        .status-pending {
            background: #ffc107;
        }

        .status-error {
            background: #ff6b6b;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: #666;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .nav-buttons {
                justify-content: center;
                flex-wrap: wrap;
            }

            h1 {
                font-size: 2rem;
            }

            .mod-item {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .mod-status {
                justify-content: space-between;
            }

            .container {
                padding: 1rem;
            }

            .card {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Mod Manager</h1>
            <div class="nav-buttons">
                <a href="{{ url_for('watch') }}" class="btn btn-secondary" style="background: rgba(76, 175, 80, 0.2); color: #4caf50; border-color: #4caf50;">📺 Watch TV</a>
                <a href="{{ url_for('channels') }}" class="btn btn-channels">📡 Channels</a>
                <a href="{{ url_for('patches_manager') }}" class="btn btn-patches">🔧 Patches</a>
                <a href="{{ url_for('library') }}" class="btn btn-secondary">📚 Library</a>
            </div>
        </header>

        <div class="main-content">
            <!-- Installed Mods -->
            <div class="card">
                <h2>📦 Installed Mods</h2>
                
                <div class="warning-box">
                    ⚠️ Changes require app restart to take effect
                </div>

                <div class="mod-list" id="modsContainer">
                    <div class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <p>Loading mods...</p>
                    </div>
                </div>
            </div>

            <!-- Upload Mod -->
            <div class="card">
                <h2>⬆️ Upload Mod</h2>
                
                <div class="upload-area" id="upload-area" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                    <div class="upload-icon">📦</div>
                    <p>
                        <strong>Drag & Drop your mod here</strong><br/>
                        or click to select a .zip or .tar.gz file
                    </p>
                    <label class="file-input-label">
                        <input type="file" id="modUploadInput" accept=".zip,.tar.gz" onchange="handleFileSelect(event)">
                        <span class="btn btn-primary">Browse Files</span>
                    </label>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" id="refreshBtn" onclick="refreshMods()">
                        ⟳ Refresh Mods
                    </button>
                    <button class="btn btn-primary" id="restartBtn" onclick="restartApp()" disabled>
                        🔄 Restart App Now
                    </button>
                </div>

                <p style="font-size: 0.85rem; color: #999; margin-top: 1rem; text-align: center;">
                    ⚠️ App restart required for changes to take effect
                </p>
            </div>
        </div>
    </div>

    <script>
        /**
         * Mod Manager UI Controller
         */
        class ModManager {
            constructor() {
                this.mods = [];
                this.hasChanges = false;
            }

            async loadMods() {
                try {
                    const response = await fetch('/api/mods');
                    if (!response.ok) throw new Error('Failed to load mods');
                    const data = await response.json();
                    
                    if (data.status !== 'ok') {
                        throw new Error(data.message || 'Unknown error');
                    }

                    this.mods = data.mods || [];
                    this.render();
                } catch (e) {
                    console.error('[ModManager] Load failed:', e);
                    this.showNotification('Failed to load mods: ' + e.message, 'error');
                    document.getElementById('modsContainer').innerHTML = 
                        `<div style="grid-column: 1/-1; padding: 40px; text-align: center; color: #ff6b6b;">
                            Error loading mods: ${e.message}
                        </div>`;
                }
            }

            render() {
                const container = document.getElementById('modsContainer');
                
                if (!this.mods || this.mods.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📦</div>
                            <p>No mods installed</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = this.mods.map(mod => `
                    <div class="mod-item ${mod.status === 'error' ? 'error' : ''}" data-mod-id="${mod.id}">
                        <div class="mod-info">
                            <h3>${this.getModIcon(mod.id)} ${mod.name}</h3>
                            <p>${mod.description}</p>
                        </div>
                        <div class="mod-status">
                            <span class="status-badge ${mod.enabled ? 'badge-enabled' : 'badge-disabled'}">
                                ${mod.enabled ? '✓ Enabled' : '○ Disabled'}
                            </span>
                            ${this.getModOpenButton(mod)}
                            <div class="mod-toggle ${mod.enabled ? 'enabled' : ''}" 
                                 data-mod-id="${mod.id}" 
                                 onclick="modManager.toggleMod('${mod.id}', this)">
                            </div>
                        </div>
                    </div>
                `).join('');
                
                // Update restart button visibility
                const restartBtn = document.getElementById('restartBtn');
                if (this.hasChanges) {
                    restartBtn.disabled = false;
                }
            }

            getModOpenButton(mod) {
                // Show "Open" button for mods with UI panels
                const modsWithUI = {
                    'eq_mod': '/eq'
                };
                
                if (modsWithUI[mod.id] && mod.enabled) {
                    return `<a href="${modsWithUI[mod.id]}" class="btn-open" target="_blank" style="margin-right: 10px; padding: 6px 12px; background: rgba(100, 150, 255, 0.3); border: 1px solid rgba(100, 150, 255, 0.6); color: #6496ff; border-radius: 4px; text-decoration: none; font-size: 0.9em;">Open</a>`;
                }
                return '';
            }

            getModIcon(modId) {
                const icons = {
                    'vcr_mod': '🎥',
                    'scheduler_mod': '📺',
                    'eq_mod': '🎚️',
                    'loudness_mod': '🔊'
                };
                return icons[modId] || '📦';
            }

            getStatusClass(mod) {
                if (mod.status === 'error') return 'error';
                if (mod.status === 'loading') return 'loading';
                if (mod.enabled) return 'loaded';
                return 'disabled';
            }

            getStatusText(mod) {
                if (mod.status === 'error') return '✗ Error';
                if (mod.status === 'loading') return '◐ Initializing...';
                if (mod.enabled) return '● Enabled';
                return '○ Disabled';
            }

            async toggleMod(modId, switchElement) {
                try {
                    switchElement.classList.add('loading');
                    const response = await fetch(`/api/mods/${modId}/toggle`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });

                    if (!response.ok) throw new Error('Toggle failed');
                    const data = await response.json();

                    if (data.status === 'ok') {
                        this.hasChanges = true;
                        document.getElementById('btnRestart').disabled = false;
                        this.showNotification(`${modId} ${data.enabled ? 'enabled' : 'disabled'}. Restart required.`, 'warning');
                        
                        // Update local state
                        const mod = this.mods.find(m => m.id === modId);
                        if (mod) mod.enabled = data.enabled;
                        this.render();
                    }
                } catch (e) {
                    console.error('[ModManager] Toggle failed:', e);
                    this.showNotification('Failed to toggle mod: ' + e.message, 'error');
                } finally {
                    switchElement.classList.remove('loading');
                }
            }

            showNotification(message, type = 'info') {
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.textContent = message;
                document.body.appendChild(notification);

                setTimeout(() => {
                    notification.remove();
                }, 4000);
            }
        }

        // Global instance
        const modManager = new ModManager();

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            modManager.loadMods();
            setInterval(() => modManager.loadMods(), 5000); // Refresh every 5 seconds
        });

        function refreshMods() {
            document.getElementById('btnRefresh').disabled = true;
            modManager.loadMods().then(() => {
                document.getElementById('btnRefresh').disabled = false;
            });
        }

        async function restartApp() {
            if (!confirm('Restart app now? This will interrupt playback.')) return;

            try {
                document.getElementById('btnRestart').disabled = true;
                const response = await fetch('/api/app/restart', { method: 'POST' });
                const data = await response.json();

                if (data.status === 'ok') {
                    modManager.showNotification('Restarting app...', 'warning');
                } else {
                    modManager.showNotification('Failed to restart: ' + data.message, 'error');
                    document.getElementById('btnRestart').disabled = false;
                }
            } catch (e) {
                console.error('[ModManager] Restart failed:', e);
                modManager.showNotification('Restart error: ' + e.message, 'error');
                document.getElementById('btnRestart').disabled = false;
            }
        }

        async function uploadMod(event) {
            const file = event.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                document.getElementById('btnUpload').disabled = true;
                modManager.showNotification('Uploading mod...', 'warning');

                const response = await fetch('/api/mods/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.status === 'ok') {
                    modManager.showNotification('Mod uploaded successfully! Refresh to see changes.', 'success');
                    modManager.loadMods();
                } else {
                    modManager.showNotification('Upload failed: ' + (data.message || 'Unknown error'), 'error');
                }
            } catch (e) {
                console.error('[ModManager] Upload failed:', e);
                modManager.showNotification('Upload error: ' + e.message, 'error');
            } finally {
                document.getElementById('btnUpload').disabled = false;
                event.target.value = ''; // Reset input
            }
        }

        // Drag and drop handlers
        function handleDragOver(event) {
            event.preventDefault();
            event.stopPropagation();
            document.getElementById('upload-area').style.background = 'rgba(0, 212, 255, 0.2)';
            document.getElementById('upload-area').style.borderColor = 'rgba(0, 212, 255, 0.8)';
        }

        function handleDragLeave(event) {
            event.preventDefault();
            event.stopPropagation();
            document.getElementById('upload-area').style.background = 'rgba(0, 212, 255, 0.05)';
            document.getElementById('upload-area').style.borderColor = 'rgba(0, 212, 255, 0.3)';
        }

        function handleDrop(event) {
            event.preventDefault();
            event.stopPropagation();
            document.getElementById('upload-area').style.background = 'rgba(0, 212, 255, 0.05)';
            document.getElementById('upload-area').style.borderColor = 'rgba(0, 212, 255, 0.3)';

            const files = event.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('modUploadInput').files = files;
                handleFileSelect({ target: { files: files } });
            }
        }

        function handleFileSelect(event) {
            const files = event.target.files;
            if (files.length > 0) {
                modManager.uploadMod(event);
            }
        }
    </script>
</body>
</html>
