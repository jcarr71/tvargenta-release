<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}TVArgenta{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { touch-action: manipulation; }
    .hide { display:none !important; }

    /* Navigation link styles */
    .nav-link {
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      font-weight: 600;
      font-size: 0.875rem;
      transition: all 0.2s;
    }
    .nav-link:hover {
      background: rgba(255,255,255,0.1);
    }
    .nav-link.active {
      background: rgba(234,179,8,0.2);
      color: #facc15;
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body class="relative bg-black text-white min-h-screen font-mono overflow-x-hidden">
  <!-- Main Content -->
  <div class="relative z-10 max-w-screen-lg mx-auto py-6 sm:py-8 px-3 sm:px-4">

    <!-- Navigation -->
    <nav class="flex flex-wrap justify-center gap-2 mb-6 sm:mb-8 items-center">
      <h1 class="text-2xl sm:text-3xl font-bold" style="background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
        📚 Library
      </h1>
      <a href="{{ url_for('watch') }}" class="nav-link bg-green-600 hover:bg-green-700 text-white">
        📺 {{ tr("nav.watch_tv") if tr else "Watch TV" }}
      </a>
      <a href="{{ url_for('channels') }}" class="nav-link bg-yellow-600 hover:bg-yellow-700 text-white">
        📡 {{ tr("nav.channels") if tr else "Channels" }}
      </a>
      <a href="{{ url_for('patches_manager') }}" class="nav-link bg-red-600 hover:bg-red-700 text-white">
        🔧 Patches
      </a>
      <a href="{{ url_for('mod_manager') }}" class="nav-link bg-cyan-600 hover:bg-cyan-700 text-white">
        📦 Mods
      </a>
      <a href="{{ url_for('logs_page') }}" class="nav-link bg-purple-600 hover:bg-purple-700 text-white">
        📋 Logs
      </a>
    </nav>

    {% block content %}{% endblock %}
  </div>

  <script>
    {% block extra_scripts %}{% endblock %}
  </script>
</body>
</html>
